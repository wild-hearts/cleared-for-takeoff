<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Course · Cleared For Takeoff</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="course.css">
</head>
<body>

<header class="course-header">
    <div class="course-logo">Cleared For <span>Takeoff</span></div>
    <nav class="header-nav">
        <a href="/" id="exit-link">← Back to site</a>
        <a href="#" onclick="logout(); return false;" style="color:#F87171;">Sign out</a>
    </nav>
</header>

<div class="page-wrap-wide">

    <!-- Hero -->
    <div class="dashboard-hero">
        <h1 id="greeting">Your course</h1>
        <p id="access-label">Loading…</p>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <p class="progress-label" id="progress-label"></p>
    </div>

    <!-- Module list (rendered by JS) -->
    <div class="modules-grid" id="modules-grid">
        <div style="text-align:center; padding:3rem; color:var(--text-muted);">Loading your course…</div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
// ─── Course data (mirrored from video-library.js) ────────────────────────────
// This is client-side only, no playback IDs are exposed here, just metadata.
const MODULES = [
    {
        id: 1, title: 'Pre-Flight Checks', subtitle: 'Understanding AI before you use it', free: true,
        lessons: [
            { id: 'm01-l01', title: 'What AI actually is (and isn\'t)',                 duration: '7:00' },
            { id: 'm01-l02', title: 'Three things it does well, three it does badly',   duration: '7:00' },
            { id: 'm01-l03', title: 'Choosing your first tool',                         duration: '7:00' },
            { id: 'm01-l04', title: 'Signing up safely',                                duration: '9:00' },
            { id: 'm01-l05', title: 'Setting up so it doesn\'t train on you',           duration: '7:00' },
            { id: 'm01-l06', title: 'Your dashboard, and your first hello',             duration: '9:00' },
        ]
    },
    {
        id: 2, title: 'Cleared For Taxi', subtitle: 'How to talk to AI well', free: true,
        lessons: [
            { id: 'm02-l01', title: 'Prompting in plain English',              duration: '10:00' },
            { id: 'm02-l02', title: 'The four flight controls',                duration: '11:00' },
            { id: 'm02-l03', title: 'How to make it interview you',            duration: '9:00'  },
            { id: 'm02-l04', title: 'Specific, vague, or start again',         duration: '10:00' },
            { id: 'm02-l05', title: 'Mistakes everyone makes in week one',     duration: '11:00' },
            { id: 'm02-l06', title: 'Saving prompts, and your Cleared To Try', duration: '10:00' },
        ]
    },
    {
        id: 3, title: 'Cleared For Takeoff', subtitle: 'AI for your actual life, six everyday paths', free: false,
        lessons: [
            { id: 'm03-l01', title: 'Welcome to the air, and Path A: Writing',        duration: '13:00' },
            { id: 'm03-l02', title: 'Path B: Summarising long things',                duration: '10:00' },
            { id: 'm03-l03', title: 'Path C: Planning anything',                      duration: '11:00' },
            { id: 'm03-l04', title: 'Path D: Research that doesn\'t lie to you',      duration: '11:00' },
            { id: 'm03-l05', title: 'Path E: Health information, calmly',             duration: '9:00'  },
            { id: 'm03-l06', title: 'Path F: Money and admin, and your Cleared To Try', duration: '12:00' },
        ]
    },
    {
        id: 4, title: 'In The Air', subtitle: 'Deep work on one real project, pick 1 track', free: false,
        pickYourTrack: true,
        tracks: [
            { id: 'm04-track-a', letter: 'A', title: 'Write something', duration: '12:00' },
            { id: 'm04-track-b', letter: 'B', title: 'Start something', duration: '12:00' },
            { id: 'm04-track-c', letter: 'C', title: 'Sort something',  duration: '12:00' },
            { id: 'm04-track-d', letter: 'D', title: 'Learn something', duration: '12:00' },
        ],
        lessons: [
            { id: 'm04-l01',     title: 'Choosing your project',                       duration: '12:00', required: true },
            { id: 'm04-track-a', title: 'Track A: Write something',                    duration: '12:00', track: 'A' },
            { id: 'm04-track-b', title: 'Track B: Start something',                    duration: '12:00', track: 'B' },
            { id: 'm04-track-c', title: 'Track C: Sort something',                     duration: '12:00', track: 'C' },
            { id: 'm04-track-d', title: 'Track D: Learn something',                    duration: '12:00', track: 'D' },
            { id: 'm04-l06',     title: 'Locking your scope, and your Cleared To Try', duration: '12:00', required: true },
        ]
    },
    {
        id: 5, title: 'Holding Pattern', subtitle: 'What to watch for, what to protect', free: false,
        lessons: [
            { id: 'm05-l01', title: 'Hallucinations: when the crew makes things up',   duration: '10:00' },
            { id: 'm05-l02', title: 'Confidently wrong vs quietly right',              duration: '9:00'  },
            { id: 'm05-l03', title: 'The five scams to see coming',                    duration: '14:00' },
            { id: 'm05-l04', title: 'Your privacy rights, in plain English',           duration: '8:00'  },
            { id: 'm05-l05', title: 'The never-share list',                            duration: '8:00'  },
            { id: 'm05-l06', title: 'Trust, verify, or walk away, and your Cleared To Try', duration: '10:00' },
        ]
    },
    {
        id: 6, title: 'Final Approach', subtitle: 'Building a lasting practice', free: false,
        lessons: [
            { id: 'm06-l01', title: 'One page, one habit, one tool',                   duration: '10:00' },
            { id: 'm06-l02', title: 'Knowing when NOT to use AI',                      duration: '10:00' },
            { id: 'm06-l03', title: 'Staying current without staying anxious',         duration: '9:00'  },
            { id: 'm06-l04', title: 'Paid tools: worth it, and not',                   duration: '9:00'  },
            { id: 'm06-l05', title: 'Bringing someone along',                          duration: '10:00' },
            { id: 'm06-l06', title: 'Final reflection, and your last Cleared To Try',  duration: '10:00' },
        ]
    }
];

// ─── State (loaded from Supabase on init) ──────────────────────────────────────
// isPreview(), hasFullAccess(), currentSession(), signOut(), sb live in supabase-config.js
const STATE = { fullAccess: false, preview: false, progress: {}, paths: [], track: '' };

const getProgress = () => STATE.progress;
const getPaths    = () => STATE.paths;
const getTrack    = () => STATE.track;

function hasAccess(mod) {
    if (mod.free) return true;
    return STATE.fullAccess;            // preview / unentitled users see free modules only
}

function isLessonVisible(lesson, mod) {
    if (!lesson.path && !lesson.track) return true; // required lessons always shown
    if (lesson.path) return STATE.paths.includes(lesson.path);
    if (lesson.track) return lesson.track === STATE.track;
    return true;
}

// ─── Logout ───────────────────────────────────────────────────────────────────
function logout() { signOut(); }        // signOut() handles sign-out + redirect

// ─── Progress tracking ────────────────────────────────────────────────────────
function getTotalLessons() {
    let total = 0;
    for (const mod of MODULES) {
        for (const l of mod.lessons) {
            if (!l.path && !l.track) { total++; continue; }
            if (l.path && STATE.paths.includes(l.path)) total++;
            if (l.track && l.track === STATE.track) total++;
        }
    }
    return total;
}

function getCompletedCount() {
    return Object.values(STATE.progress).filter(Boolean).length;
}

// ─── Init: load access + progress from Supabase, then render ────────────────────
async function init() {
    // Path/track selections stay local for now (low-stakes; server-side later).
    STATE.paths = JSON.parse(localStorage.getItem('c4t_paths') || '[]');
    STATE.track = localStorage.getItem('c4t_track') || '';

    if (isPreview()) {
        STATE.preview  = true;
        STATE.progress = JSON.parse(localStorage.getItem('c4t_progress') || '{}');
        return render();
    }

    const session = await currentSession();
    if (!session) { window.location.href = 'index.html'; return; }

    STATE.fullAccess = await hasFullAccess();

    const { data } = await sb.from('progress').select('lesson_id').eq('status', 'completed');
    STATE.progress = {};
    (data || []).forEach(r => { STATE.progress[r.lesson_id] = true; });

    render();
}

// ─── Render dashboard ─────────────────────────────────────────────────────────
function render() {
    const progress  = getProgress();
    const paths     = getPaths();
    const track     = getTrack();
    const preview   = isPreview();
    const total     = getTotalLessons();
    const completed = getCompletedCount();
    const pct       = total > 0 ? Math.round((completed / total) * 100) : 0;

    // Header
    document.getElementById('greeting').textContent = preview
        ? 'Free Preview: Modules 1 & 2'
        : 'Your course';

    document.getElementById('access-label').textContent =
        preview            ? 'You\'re viewing the free preview. Modules 1 and 2 are fully unlocked.'
        : STATE.fullAccess ? 'Full course access'
        :                    'Modules 1 and 2 are unlocked. Upgrade to unlock the rest.';

    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-label').textContent =
        completed === 0 ? 'No lessons completed yet, pick up where you left off below'
        : `${completed} of ${total} lessons completed`;

    // Modules
    const grid = document.getElementById('modules-grid');
    grid.innerHTML = '';

    for (const mod of MODULES) {
        const accessible = hasAccess(mod);
        const needsPathSelection = accessible && mod.pickYourPath && paths.length < 3;
        const needsTrackSelection = accessible && mod.pickYourTrack && !track;

        // Count completions for this module
        const moduleLessons = mod.lessons.filter(l => isLessonVisible(l, mod));
        const moduleDone    = moduleLessons.filter(l => progress[l.id]).length;
        const allDone       = moduleLessons.length > 0 && moduleDone === moduleLessons.length;

        // Module card
        const card = document.createElement('div');
        card.className = 'module-card';

        const numClass = allDone ? 'done' : !accessible ? 'locked' : '';
        const numContent = allDone ? '✓' : mod.id;

        const badgeClass = mod.free ? 'badge-free'
            : !accessible ? 'badge-locked'
            : 'badge-unlocked';
        const badgeText = mod.free ? 'Free preview'
            : !accessible ? '🔒 Locked'
            : 'Unlocked';

        card.innerHTML = `
            <div class="module-card-header" onclick="toggleModule(this)">
                <div class="module-meta">
                    <div class="module-number ${numClass}">${numContent}</div>
                    <div class="module-info">
                        <h3>${mod.title}</h3>
                        <p class="module-subtitle">${mod.subtitle}</p>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <span class="module-badge ${badgeClass}">${badgeText}</span>
                    <span class="module-chevron">▾</span>
                </div>
            </div>
            <div class="lesson-list">${renderLessons(mod, accessible, needsPathSelection, needsTrackSelection, progress, paths, track)}</div>
        `;

        // Auto-open first accessible module with no completions
        if (accessible && moduleDone === 0 && grid.querySelectorAll('.module-card.open').length === 0) {
            card.classList.add('open');
        }

        grid.appendChild(card);
    }
}

function renderLessons(mod, accessible, needsPathSelection, needsTrackSelection, progress, paths, track) {
    if (!accessible) {
        return `<div style="padding:1.25rem 1.75rem; color:var(--text-muted); font-size:0.9rem;">
            🔒 Unlock with a course access code. <a href="/#pricing" style="color:var(--accent);">See options</a>
        </div>`;
    }

    let html = '';

    if (needsPathSelection) {
        html += `<div class="pick-banner">
            <span>Pick your 3 paths to unlock Module 3 lessons</span>
            <a href="select-paths.html">Choose paths →</a>
        </div>`;
    }

    if (needsTrackSelection) {
        html += `<div class="pick-banner">
            <span>Choose your track to unlock Module 4</span>
            <a href="select-track.html">Choose track →</a>
        </div>`;
    }

    for (const lesson of mod.lessons) {
        const visible   = isLessonVisible(lesson, mod);
        const done      = !!progress[lesson.id];
        const isPath    = !!lesson.path;
        const isTrack   = !!lesson.track;
        const greyedOut = (isPath && !paths.includes(lesson.path)) ||
                          (isTrack && lesson.track !== track);

        if (greyedOut && (needsPathSelection || needsTrackSelection)) continue;

        const statusClass = done ? 'done' : '';
        const statusIcon  = done ? '✓' : '';
        const itemClass   = greyedOut ? 'lesson-item locked' : 'lesson-item';
        const href        = greyedOut ? '#' : `watch.html?lesson=${lesson.id}`;

        html += `<a class="${itemClass}" href="${href}" ${greyedOut ? 'onclick="return false"' : ''}>
            <div class="lesson-status ${statusClass}">${statusIcon}</div>
            <span class="lesson-title">${lesson.title}</span>
            <span class="lesson-duration">${lesson.duration}</span>
        </a>`;
    }

    return html;
}

function toggleModule(header) {
    const card = header.closest('.module-card');
    card.classList.toggle('open');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
init();
</script>

</body>
</html>
